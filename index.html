<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Precios Te Quiero</title>
</head>

<body>
    <div class="main">
        <video class="video" id="mainVideo" autoplay muted loop playsinline></video>
        <div class="prices">
            <div class="spetial">
                <h1 class="metal">ORO ESPECIAL</h1>
                <h2 class="price">126,46€/g</h2>
            </div>
            <div class="used">
                <h1 class="metal">ORO OCASIÓN</h1>
                <h2 class="price">101,91€/g</h2>
            </div>
            <div class="igic">
                <h1>**Los precios indicados no incluyen el 15% de IGIC**</h1>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const FALLBACK = './assets/VIDEO TV.mp4';
        const POLL_INTERVAL = 5 * 60 * 1000;
        const CACHE_KEY = 'tq_video_url';
        const STORE_ID = new URLSearchParams(window.location.search).get('store');
        let currentUrl = null;

        function playUrl(url) {
            if (url === currentUrl) return;
            currentUrl = url;
            video.src = url;
            video.load();
            video.play().catch(() => {});
        }

        function sendPing() {
            if (!STORE_ID) return;
            fetch('/api/ping', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ store: STORE_ID }),
            }).catch(() => {});
        }

        async function checkUpdate() {
            try {
                const res = await fetch('/api/video');
                const data = await res.json();
                if (data.url) {
                    localStorage.setItem(CACHE_KEY, data.url);
                    playUrl(data.url);
                }
            } catch { /* mantener el vídeo actual */ }
            sendPing();
        }

        // Reproducir inmediatamente desde caché sin esperar la API
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            playUrl(cached);
        } else {
            playUrl(FALLBACK);
        }

        // Comprobar actualizaciones en segundo plano
        checkUpdate();
        setInterval(checkUpdate, POLL_INTERVAL);
    </script>
</body>

</html>
